<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LearnKloud.Today screenshots</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-alt: #eef2f7;
      --border: #e5e7eb;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #4b5efa;
      --primary-soft: #e8eaff;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }
    body.dark {
      --bg: #050b18;
      --surface: #101c36;
      --surface-alt: #0a1327;
      --border: #1f315a;
      --text: #e5e7eb;
      --muted: #93a4c4;
      --primary-soft: rgba(75, 94, 250, 0.16);
    }
    .screen {
      width: 1080px;
      height: 1920px;
      padding: 88px 54px 70px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 30px;
      font-weight: 700;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #fff;
      font-size: 30px;
    }
    h1 {
      margin: 8px 0 0;
      font-size: 72px;
      line-height: 1.06;
      letter-spacing: 0;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 34px;
      line-height: 1.36;
    }
    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 24px;
      padding: 30px;
    }
    .primary-card {
      border-color: rgba(75, 94, 250, 0.42);
    }
    .eyebrow {
      color: var(--primary);
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .title {
      margin-top: 12px;
      font-size: 40px;
      line-height: 1.2;
      font-weight: 800;
    }
    .body {
      margin-top: 12px;
      color: var(--muted);
      font-size: 28px;
      line-height: 1.35;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .between {
      justify-content: space-between;
    }
    .pill {
      background: var(--surface-alt);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 16px 22px;
      font-size: 26px;
      font-weight: 700;
      color: var(--muted);
    }
    .pill.primary {
      background: var(--primary-soft);
      border-color: rgba(75, 94, 250, 0.35);
      color: var(--primary);
    }
    .button {
      margin-top: 28px;
      height: 76px;
      border-radius: 18px;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 800;
    }
    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .quick {
      min-height: 140px;
      text-align: center;
      display: grid;
      place-items: center;
      gap: 8px;
    }
    .quick .icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--primary-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
      font-size: 28px;
      margin: 0 auto;
    }
    .quick .label {
      font-size: 26px;
      font-weight: 800;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .item {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .item-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 28px;
      flex: 0 0 auto;
    }
    .item-main {
      flex: 1;
    }
    .item-title {
      font-size: 31px;
      font-weight: 800;
      line-height: 1.2;
    }
    .item-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.3;
    }
    .progress {
      height: 14px;
      background: var(--surface-alt);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      background: var(--primary);
      border-radius: inherit;
    }
    .score {
      width: 260px;
      height: 260px;
      border-radius: 130px;
      display: grid;
      place-items: center;
      margin: 20px auto;
      background: rgba(16, 185, 129, 0.16);
      border: 8px solid var(--success);
      color: var(--success);
      font-size: 68px;
      font-weight: 900;
    }
    .phone-note {
      margin-top: auto;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.35;
      text-align: center;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    const params = new URLSearchParams(location.search);
    const screen = params.get('screen') || 'home';
    if (screen === 'profile-dark') document.body.classList.add('dark');

    const data = {
      login: {
        title: 'Start learning with one calm sign in.',
        sub: 'Simple account access keeps the first-run experience friendly and focused.',
        body: `<div class="card primary-card">
          <div class="eyebrow">Welcome</div>
          <div class="title">LearnKloud.Today</div>
          <div class="body">Continue your AWS cloud and AI certification prep with synced progress, streaks, and quiz history.</div>
          <div class="button">Continue with email</div>
        </div>
        <div class="card"><div class="title">Try before you commit</div><div class="body">Guest mode lets new students explore quizzes and flashcards first.</div></div>`
      },
      home: {
        title: 'Pick up one focused cloud task.',
        sub: 'A calm study dashboard for AWS cloud and AI certification practice.',
        body: `
          <div class="card primary-card">
            <div class="row between"><div class="eyebrow">Start here</div><div class="pill primary">Ready</div></div>
            <div class="title">Daily Quiz: Amazon Bedrock Fundamentals</div>
            <div class="body">Foundation model APIs, model selection, guardrails, and core Bedrock concepts.</div>
            <div class="button">Start Practice</div>
          </div>
          <div class="grid3">
            <div class="card quick"><div><div class="icon">✓</div><div class="label">Practice</div></div></div>
            <div class="card quick"><div><div class="icon">□</div><div class="label">Flashcards</div></div></div>
            <div class="card quick"><div><div class="icon">i</div><div class="label">Learn</div></div></div>
          </div>`
      },
      practice: {
        title: 'Choose one quiz. Review calmly.',
        sub: 'Simple filters and readable quiz rows keep students oriented.',
        body: `<div class="row"><div class="pill primary">All</div><div class="pill">AI</div><div class="pill">Security</div><div class="pill">CLF-C02</div></div>
        <div class="list">
          ${['CLF-C02: Cloud Concepts|29 questions · 25 min','Amazon Bedrock Fundamentals|10 questions · 15 min','Security & Compliance|42 questions · 35 min','AWS Cost Optimization|10 questions · 15 min'].map((x,i)=>{const [a,b]=x.split('|');return `<div class="item"><div class="item-icon">${i+1}</div><div class="item-main"><div class="item-title">${a}</div><div class="item-meta">${b}</div></div><div class="pill">Open</div></div>`}).join('')}
        </div>`
      },
      quiz: {
        title: 'Exam practice without visual noise.',
        sub: 'Large readable questions, clear answer states, and explanations after review.',
        body: `<div class="card">
          <div class="row between"><div class="pill primary">Question 4 of 10</div><div class="pill">12 sec</div></div>
          <div class="title" style="margin-top:34px">Which AWS service provides object storage designed for virtually unlimited scale?</div>
        </div>
        <div class="list">
          <div class="item"><div class="item-main"><div class="item-title">Amazon S3</div></div></div>
          <div class="item"><div class="item-main"><div class="item-title">Amazon EC2</div></div></div>
          <div class="item"><div class="item-main"><div class="item-title">Amazon RDS</div></div></div>
          <div class="item"><div class="item-main"><div class="item-title">AWS Lambda</div></div></div>
        </div>`
      },
      results: {
        title: 'Progress feels understandable.',
        sub: 'Students can see what happened and what to review next.',
        body: `<div class="score">84%</div>
        <div class="card"><div class="title" style="text-align:center">Passed</div><div class="body" style="text-align:center">CLF-C02 Cloud Concepts · answers saved to your progress</div></div>
        <div class="grid3">
          <div class="card quick"><div><div class="label">84</div><div class="body">Points</div></div></div>
          <div class="card quick"><div><div class="label">8</div><div class="body">Correct</div></div></div>
          <div class="card quick"><div><div class="label">2</div><div class="body">Review</div></div></div>
        </div>`
      },
      progress: {
        title: 'Consistency, scores, and next steps.',
        sub: 'A quiet progress screen for students who want to know where they stand.',
        body: `<div class="card">
          <div class="row between"><div><div class="title">Study streak</div><div class="body">Keep showing up today.</div></div><div class="pill primary">3 days</div></div>
          <div class="progress" style="margin-top:30px"><div class="fill" style="width:45%"></div></div>
        </div>
        <div class="card"><div class="row between"><div><div class="title">XP and accuracy</div><div class="body">720 XP · 82% average score</div></div></div></div>
        <div class="list"><div class="item"><div class="item-icon">1</div><div class="item-main"><div class="item-title">Amazon Bedrock Fundamentals</div><div class="item-meta">8/10 · Today</div></div><div class="pill primary">80%</div></div></div>`
      },
      'profile-dark': {
        title: 'Dark mode is still available.',
        sub: 'Students can switch between bright daytime study and soft dark surfaces.',
        body: `<div class="card"><div class="row between"><div><div class="title">Theme</div><div class="body">Soft dark surfaces for night study</div></div><div class="pill primary">On</div></div></div>
        <div class="grid3">
          <div class="card quick"><div><div class="label">720</div><div class="body">XP</div></div></div>
          <div class="card quick"><div><div class="label">Lv 4</div><div class="body">Associate</div></div></div>
          <div class="card quick"><div><div class="label">82%</div><div class="body">Average</div></div></div>
        </div>
        <div class="card"><div class="title">Text Size</div><div class="body">Small · Medium · Large options support different readers.</div></div>`
      }
    };
    const current = data[screen] || data.home;
    document.getElementById('app').innerHTML = `
      <section class="screen">
        <div class="brand"><div class="logo">L</div><div>LearnKloud.Today</div></div>
        <h1>${current.title}</h1>
        <p class="sub">${current.sub}</p>
        ${current.body}
        <p class="phone-note">AWS, GCP, and Azure certification prep with quizzes, flashcards, and guided study paths.</p>
      </section>`;
  </script>
</body>
</html>
